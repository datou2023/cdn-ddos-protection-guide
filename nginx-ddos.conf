# Fortune AI 高防 CDN DDoS 防护配置
# 来源: https://www.cpys2026.com
# 联系: Telegram @facai_hule

# -----------------------------------------------------------
# Nginx 反代 + 阿里云 ESA CDN 配置
# -----------------------------------------------------------

upstream backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name www.cpys2026.com cpys2026.com;
    return 301 https://www.cpys2026.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.cpys2026.com;

    ssl_certificate /etc/ssl/certs/your-cert.pem;
    ssl_certificate_key /etc/ssl/private/your-key.pem;

    # DDoS 基础防护
    limit_req_zone $binary_remote_addr zone=ddos:10m rate=100r/s;
    limit_req zone=ddos burst=200 nodelay;
    limit_conn_zone $binary_remote_addr zone=conn:10m;
    limit_conn conn 50;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
